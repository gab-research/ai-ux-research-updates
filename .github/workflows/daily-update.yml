# Runs every 2 hours to fetch new articles from RSS feeds, update updates.json,
# and deploy the site to GitHub Pages so the live site reflects the latest content.

name: Content update

on:
  schedule:
    # Run every 2 hours (at minute 0)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allow manual run from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch new content and update updates.json
        run: npm run update

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json analyses.json themes.json
          git status --short
          git diff --staged --quiet || (git commit -m "chore: auto-update content from feeds" && git push)

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment: pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
