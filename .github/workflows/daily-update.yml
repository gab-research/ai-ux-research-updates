# Runs daily to fetch new articles from RSS feeds and update updates.json.
# Push this repo to GitHub and the site will refresh automatically every day.

name: Daily content update

on:
  schedule:
    # Run every day at 11:00 UTC = 8:00 AM Brasília (UTC-3)
    - cron: '0 11 * * *'
  workflow_dispatch:
    # Allow manual run from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch new content and update updates.json
        run: npm run update

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json analyses.json themes.json
          git diff --staged --quiet || (git commit -m "chore: auto-update content from feeds" && git push)
